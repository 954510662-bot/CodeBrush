{
  "version": "3.8",
  "services": {
    "api": {
      "build": {
        "context": ".",
        "dockerfile": "Dockerfile"
      },
      "ports": [
        "3001:3001"
      ],
      "environment": [
        "NODE_ENV=production",
        "PORT=3001"
      ],
      "depends_on": [
        "redis"
      ],
      "restart": "unless-stopped",
      "deploy": {
        "replicas": 2,
        "update_config": {
          " parallelism": 1,
          "delay": "10s",
          "action": "rollback"
        },
        "resources": {
          "limits": {
            "cpus": "1",
            "memory": "1G"
          },
          "reservations": {
            "cpus": "0.5",
            "memory": "512M"
          }
        }
      }
    },
    "redis": {
      "image": "redis:7-alpine",
      "ports": [
        "6379:6379"
      ],
      "volumes": [
        "redis_data:/data"
      ],
      "restart": "unless-stopped",
      "deploy": {
        "resources": {
          "limits": {
            "cpus": "0.5",
            "memory": "256M"
          }
        }
      }
    },
    "nginx": {
      "image": "nginx:alpine",
      "ports": [
        "80:80",
        "443:443"
      ],
      "volumes": [
        "./nginx.conf:/etc/nginx/nginx.conf:ro"
      ],
      "depends_on": [
        "api"
      ],
      "restart": "unless-stopped"
    }
  },
  "volumes": {
    "redis_data": {}
  }
}
